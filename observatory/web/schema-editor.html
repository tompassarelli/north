<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Schema Editor — fram predicate vocabulary (eddy)</title>
  <!-- utility-class → CSS-var mapping (the .text-foreground etc. the eddy components use).
       :root var VALUES are injected by the compiled JS from the .eddy (theme …) form. -->
  <link rel="stylesheet" href="/schema-editor.css">
  <style>
    html, body { margin: 0; height: 100%; background: var(--background); color: var(--foreground); }
    #app { height: 100vh; }
    .eddy-panel { border: 1px solid var(--border); border-radius: 8px; margin: 8px 12px; padding: 12px 14px; background: var(--muted); }
    .se-label { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted-foreground); margin-bottom: 6px; }
    .se-row { display: flex; gap: 10px; align-items: center; margin: 8px 0; }
    .se-row label { width: 92px; font-size: 12px; color: var(--muted-foreground); }
    .se-row select { flex: 1; padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--background); color: var(--foreground); font-size: 13px; }
    .se-save { margin-top: 6px; padding: 7px 14px; border: 0; border-radius: 6px; background: var(--primary); color: var(--primary-foreground); font-size: 13px; font-weight: 600; cursor: pointer; }
    .se-save:hover { opacity: .9; }
    .se-status { font-size: 12px; margin-top: 8px; min-height: 16px; color: var(--accent); }
    .se-empty { font-size: 13px; color: var(--muted-foreground); }
  </style>
</head>
<body>
  <div id="app"></div>

  <!-- WRITE-BACK PANE — the schema EDIT form the eddy view mounts. eddy carves a
       container per (panel … :mount "schemaEditor.mountEditor") and hands it { el, eddy };
       the pane shares the SAME /schema feed (eddy.feed.onUpdate) + selection
       (eddy.selection.get) as the entity-view. It renders cardinality/value_kind <select>s
       for the SELECTED predicate and POSTs the change to the bridge /schema endpoint;
       a successful write triggers the feed re-fetch so the row + detail re-render with
       the saved value. (Feed-mode eddy stores are read-only; the mutation lives here —
       the documented escape-hatch seam.) -->
  <script>
    window.schemaEditor = window.schemaEditor || {};
    const SCHEMA_URL = "/schema";

    window.schemaEditor.mountEditor = ({ el, eddy }) => {
      // --- static scaffold ---
      const title = document.createElement('div');
      title.className = 'se-label';
      title.textContent = 'edit schema · cardinality + value_kind';
      el.appendChild(title);

      const body = document.createElement('div');
      el.appendChild(body);

      const empty = document.createElement('div');
      empty.className = 'se-empty';
      empty.textContent = 'Select a predicate to edit its schema.';
      body.appendChild(empty);

      const form = document.createElement('div');
      form.style.display = 'none';
      body.appendChild(form);

      const nameEl = document.createElement('div');
      nameEl.style.cssText = 'font-size:14px;font-weight:600;margin-bottom:8px;color:var(--foreground)';
      form.appendChild(nameEl);

      const mkSelect = (label, opts) => {
        const row = document.createElement('div'); row.className = 'se-row';
        const lab = document.createElement('label'); lab.textContent = label; row.appendChild(lab);
        const sel = document.createElement('select');
        for (const o of opts) { const op = document.createElement('option'); op.value = o; op.textContent = o; sel.appendChild(op); }
        row.appendChild(sel); form.appendChild(row);
        return sel;
      };
      const cardSel = mkSelect('cardinality', ['single', 'multi']);
      const kindSel = mkSelect('value_kind', ['literal', 'ref']);

      const save = document.createElement('button');
      save.className = 'se-save';
      save.textContent = 'Save to graph';
      form.appendChild(save);

      const status = document.createElement('div');
      status.className = 'se-status';
      form.appendChild(status);

      // --- bind to the shared bus ---
      const rowFor = (name) => {
        const store = eddy && eddy.stores && eddy.stores.predicates;
        if (!store || !name) return null;
        return store.all().find(r => String(r.name) === String(name)) || null;
      };

      let current = null;            // the predicate name currently in the form
      const render = () => {
        const name = eddy && eddy.selection ? eddy.selection.get() : null;
        const row = rowFor(name);
        if (!row) { empty.style.display = ''; form.style.display = 'none'; current = null; return; }
        empty.style.display = 'none'; form.style.display = '';
        // only reset the controls when the SELECTION changed (don't stomp a half-made edit)
        if (current !== row.name) {
          current = row.name;
          nameEl.textContent = row.name;
          cardSel.value = row.cardinality || 'single';
          kindSel.value = row.value_kind || 'literal';
          status.textContent = '';
        } else {
          // selection unchanged: refresh from the feed only if the user hasn't diverged
          if (cardSel.value === (row.cardinality || 'single') && kindSel.value === (row.value_kind || 'literal')) { /* in sync */ }
        }
      };

      const post = (field, value) =>
        fetch(SCHEMA_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ predicate: current, field, value })
        }).then(r => r.json());

      save.addEventListener('click', async () => {
        if (!current) return;
        status.textContent = 'saving…';
        try {
          const a = await post('cardinality', cardSel.value);
          const b = await post('value_kind', kindSel.value);
          status.textContent = (a.ok && b.ok) ? `saved ${current} → ${cardSel.value} / ${kindSel.value}` : 'write rejected (see console)';
          if (!(a.ok && b.ok)) console.warn('schema write:', a, b);
        } catch (err) { status.textContent = 'save failed'; console.error(err); }
      });

      // re-render on feed deltas (the saved value comes back through the mirror)…
      if (eddy && eddy.feed) eddy.feed.onUpdate(() => render());
      // …and poll selection (eddy.selection has no change event).
      setInterval(render, 400);
      render();
    };
  </script>

  <script src="/schema-editor.js"></script>
</body>
</html>
