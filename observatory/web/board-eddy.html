<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Board — eddy dogfood (framescope)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource-variable/geist@1/index.min.css">
  <link rel="stylesheet" href="board-eddy-dist.css">
  <style>
    html, body { height: 100%; margin: 0; background: var(--background, #0c0f17); }
    #app { height: 100vh; }
    /* kanban panel (host-shell owned — see mountKanban) */
    .fk-kanban { display:flex; gap:.5rem; padding:.6rem; overflow-x:auto; }
    .fk-col { display:flex; flex-direction:column; min-width:170px; width:184px; flex-shrink:0;
              background:var(--muted,#121624); border:1px solid var(--border,#283150);
              border-radius:7px; max-height:62vh; }
    .fk-col.drag-over { border-color:var(--primary,#6ea8ff); background:#10142a; }
    .fk-col-hdr { display:flex; justify-content:space-between; align-items:center;
                  padding:.4rem .6rem; border-bottom:1px solid var(--border,#283150); }
    .fk-col-label { font-size:.66rem; font-weight:700; text-transform:uppercase;
                    letter-spacing:.07em; color:var(--muted-foreground,#8a96b4); }
    .fk-col-count { font-size:.62rem; padding:.05rem .32rem; border-radius:9px;
                    background:var(--background,#161b2c); color:var(--muted-foreground,#5b678a); }
    .fk-cards { flex:1; overflow-y:auto; padding:.3rem; display:flex; flex-direction:column;
                gap:.3rem; min-height:36px; }
    .fk-card { background:var(--background,#161b2c); border:1px solid var(--border,#283150);
               border-radius:5px; padding:.4rem .46rem; cursor:grab; user-select:none; }
    .fk-card:hover { border-color:var(--muted-foreground,#5b678a); }
    .fk-card.dragging { opacity:.3; }
    .fk-card.selected { border-color:var(--primary,#6ea8ff); }
    .fk-card-title { font-size:.74rem; color:var(--foreground,#e6ebf5); line-height:1.35;
                     word-break:break-word; }
    .fk-card-meta { font-size:.6rem; color:var(--muted-foreground,#8a96b4); margin-top:.2rem; }
    .fk-title { font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.1em;
                color:var(--muted-foreground,#5b678a); padding:.5rem .6rem 0; }
  </style>
</head>
<body>
  <div id="app"></div>

  <!-- ── HOST-SHELL SEAM (stands in for framescope's cockpit shell) ──────────────────────
       Two host-shell concerns the eddy view surface can't express, both wired to the SAME
       eddy thread store + selection bus:

       (1) FEED PROJECTION — eddy's :feed wants a flat JSON array keyed by an identity field;
           the bridge's /graph returns {nodes,edges} with DERIVED lifecycle. We intercept the
           feed URL (/board-threads) with a fetch shim that pulls both graphs (board :7977 +
           work :7978), derives the lifecycle column, and returns flat thread rows. (The
           fleet's /presence does this server-side; we can't add a bridge route, so we project
           client-side — same seam, different side of the wire.)

       (2) KANBAN + DRAG-TO-EDGE — eddy frontend views are single-list-with-detail (its
           :filters are server-mode only; no multi-column layout, no DnD primitive). So the
           6 lifecycle columns and the drag→POST /edge claim-write live in mountKanban, reading
           window.eddy.stores.threads + eddy.selection. Drop on a column applies the lifecycle
           transition via the bridge's existing /edge endpoint, then the live feed re-pulls. -->
  <script>
    window.framescope = window.framescope || {};

    const COLS = [
      { id: 'backlog',   label: 'Backlog' },
      { id: 'ready',     label: 'Ready' },
      { id: 'active',    label: 'Active' },
      { id: 'blocked',   label: 'Blocked' },
      { id: 'done',      label: 'Done' },
      { id: 'abandoned', label: 'Abandoned' },
    ];

    // ── (1) feed projection: /graph {nodes,edges} → flat thread rows with derived lifecycle ──
    async function fetchGraph(port) {
      try { return await fetch('/graph?port=' + port).then(r => r.json()); }
      catch (_) { return { nodes: [], edges: [] }; }
    }
    // Lifecycle derived from facts (mirrors board.js deriveCol), not a stored status.
    function deriveCol(t, byFrom, tmap) {
      const a = t.attrs || {};
      const es = byFrom[t.id] || [];
      if (a.abandoned) return 'abandoned';
      if (a.outcome)   return 'done';
      if (es.some(e => e.pred === 'driver')) return 'active';
      const deps = es.filter(e => e.pred === 'depends_on');
      if (deps.length && deps.some(e => {
        const d = tmap[e.to];
        return !d || (!(d.attrs || {}).outcome && !(d.attrs || {}).abandoned);
      })) return 'blocked';
      if (a.committed) return 'ready';
      return 'backlog';
    }
    function shorten(s) {
      return String(s).replace('@agent:', '').replace('@role:', '').slice(0, 14);
    }
    async function projectThreads() {
      const [board, work] = await Promise.all([fetchGraph(7977), fetchGraph(7978)]);
      const nodes = [
        ...(board.nodes || []).map(n => ({ ...n, _port: 7977 })),
        ...(work.nodes || []).map(n => ({ ...n, _port: 7978 })),
      ];
      const edges = [...(board.edges || []), ...(work.edges || [])];
      const seen = new Set();
      const threads = nodes.filter(n => {
        if (!n.attrs || !n.attrs.title) return false;
        if (/^@?topic-/.test(n.id)) return false;     // @topic-* index threads hidden by default
        if (seen.has(n.id)) return false;
        seen.add(n.id);
        return true;
      });
      const byFrom = {};
      for (const e of edges) (byFrom[e.from] = byFrom[e.from] || []).push(e);
      const tmap = Object.fromEntries(threads.map(t => [t.id, t]));
      return threads.map(t => {
        const a = t.attrs || {};
        const es = byFrom[t.id] || [];
        const ownerEdge = es.find(e => e.pred === 'owner');
        const driverEdge = es.find(e => e.pred === 'driver');
        const owner = (ownerEdge ? ownerEdge.to : null) || a.owner || '';
        const driver = (driverEdge ? driverEdge.to : null) || a.driver || '';
        const est = a.estimate_hours || a.estimate || '';
        return {
          id: t.id,
          _port: t._port,
          title: a.title || t.id,
          lifecycle: deriveCol(t, byFrom, tmap),
          owner: owner ? '\u{1F464} ' + shorten(owner) : '',
          driver: driver ? '▸ ' + shorten(driver) : '',
          estimate: est ? est + 'h' : '',
          body: (a.body || '').trim().slice(0, 1200),
        };
      });
    }

    // fetch shim: intercept the eddy feed URL, serve the projected rows. Everything else
    // (including the /graph and /edge calls this shim itself issues) passes through.
    const _realFetch = window.fetch.bind(window);
    window.fetch = function (input, init) {
      const url = typeof input === 'string' ? input : (input && input.url) || '';
      if (url.indexOf('/board-threads') !== -1) {
        return projectThreads().then(rows =>
          new Response(JSON.stringify(rows), { status: 200, headers: { 'Content-Type': 'application/json' } }));
      }
      return _realFetch(input, init);
    };

    // ── (2) kanban + drag-to-edge mount, sharing window.eddy.stores.threads + selection ──
    function postEdge(port, from, pred, to) {
      return _realFetch('/edge', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ port, from, pred, to }),
      });
    }
    // lifecycle transition → claim write (mirrors board.js applyTransition). Returns false if cancelled.
    async function applyTransition(row, toCol) {
      const port = row._port || 7977;
      const id = row.id;
      switch (toCol) {
        case 'ready':     await postEdge(port, id, 'committed', 'true'); return true;
        case 'active': {
          const driver = prompt('Driver (role or @agent:uuid):');
          if (!driver) return false;
          await postEdge(port, id, 'driver', driver); return true;
        }
        case 'done':      await postEdge(port, id, 'outcome', 'done'); return true;
        case 'abandoned': await postEdge(port, id, 'abandoned', 'true'); return true;
        case 'blocked': {
          const dep = prompt('Depends on (thread @id):');
          if (!dep) return false;
          await postEdge(port, id, 'depends_on', dep); return true;
        }
        case 'backlog':
          await _realFetch('/retract', { method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ port, from: id, pred: 'committed', to: 'true' }) }).catch(() => {});
          return true;
        default: return false;
      }
    }

    window.framescope.mountKanban = ({ el, eddy }) => {
      const store = eddy && eddy.stores && eddy.stores.threads;
      el.innerHTML = '';
      const title = document.createElement('div');
      title.className = 'fk-title';
      title.textContent = 'Lifecycle kanban (host-shell pane · drag a card between columns)';
      el.appendChild(title);
      const board = document.createElement('div');
      board.className = 'fk-kanban';
      el.appendChild(board);

      const colMap = {};
      for (const col of COLS) {
        const colEl = document.createElement('div');
        colEl.className = 'fk-col';
        const hdr = document.createElement('div');
        hdr.className = 'fk-col-hdr';
        const lbl = document.createElement('span'); lbl.className = 'fk-col-label'; lbl.textContent = col.label;
        const cnt = document.createElement('span'); cnt.className = 'fk-col-count'; cnt.textContent = '0';
        hdr.append(lbl, cnt);
        const cards = document.createElement('div');
        cards.className = 'fk-cards';
        colEl.append(hdr, cards);

        colEl.addEventListener('dragover', e => { e.preventDefault(); colEl.classList.add('drag-over'); });
        colEl.addEventListener('dragleave', e => { if (!colEl.contains(e.relatedTarget)) colEl.classList.remove('drag-over'); });
        colEl.addEventListener('drop', async e => {
          e.preventDefault();
          colEl.classList.remove('drag-over');
          const id = e.dataTransfer.getData('text/plain');
          const rows = store ? store.all() : [];
          const row = rows.find(r => r.id === id);
          if (!row || row.lifecycle === col.id) return;
          await applyTransition(row, col.id);
          // the eddy feed's /live WS + 15s backstop re-pull the projection after the claim write
        });

        colMap[col.id] = { cards, cnt };
        board.appendChild(colEl);
      }

      function render() {
        const rows = store ? store.all() : [];
        const sel = eddy && eddy.selection ? eddy.selection.get() : null;
        const buckets = {};
        for (const c of COLS) buckets[c.id] = [];
        for (const r of rows) (buckets[r.lifecycle] || buckets.backlog).push(r);
        for (const col of COLS) {
          const { cards, cnt } = colMap[col.id];
          cards.innerHTML = '';
          cnt.textContent = buckets[col.id].length;
          for (const r of buckets[col.id]) {
            const card = document.createElement('div');
            card.className = 'fk-card' + (r.id === sel ? ' selected' : '');
            card.draggable = true;
            card.dataset.id = r.id;
            const t = document.createElement('div'); t.className = 'fk-card-title'; t.textContent = r.title;
            card.appendChild(t);
            const meta = [r.owner, r.driver, r.estimate].filter(Boolean).join('  ');
            if (meta) { const m = document.createElement('div'); m.className = 'fk-card-meta'; m.textContent = meta; card.appendChild(m); }
            card.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain', r.id); card.classList.add('dragging'); });
            card.addEventListener('dragend', () => card.classList.remove('dragging'));
            card.addEventListener('click', () => { if (eddy.selection) eddy.selection.set(r.id); render(); });
            cards.appendChild(card);
          }
        }
      }

      render();
      if (eddy && eddy.feed) eddy.feed.onUpdate(() => render());
    };
  </script>

  <script src="board-eddy.js"></script>
</body>
</html>
