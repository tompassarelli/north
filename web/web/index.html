<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>lodestar web</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header id="topbar">
  <div class="brand"><span class="logo">◆</span> lodestar <span class="sub">web</span></div>
  <div class="omni"><input id="omni" type="search" placeholder="⌕ search…" autocomplete="off" spellcheck="false"></div>
  <button id="cmdk-hint" class="cmdk-hint" title="Command palette — quick actions, group, voice">⌘K</button>
  <div class="conn">
    <label class="ctx-pick">context
      <select id="context" style="background:var(--bg2);color:var(--ink);border:1px solid var(--line);border-radius:6px;padding:3px 6px;font-family:var(--mono);font-size:13px;">
        <option value="agents">Agents</option>
        <option value="board">Board</option>
        <option value="code">Code</option>
        <option value="attention">Attention</option>
      </select>
    </label>
    <span id="status" class="dot off" title="disconnected"></span>
    <span id="status-label">connecting…</span>
  </div>
</header>

<div class="app-body">
  <!-- AGENTS: always-visible left panel -->
  <aside id="agents">
    <div class="pane-head"><span class="pane-label">Agents</span> <span id="agent-count" class="count">0</span><button id="agents-toggle" class="pane-toggle" title="collapse sidebar">‹</button></div>
    <div class="seg agent-filter" id="agent-filter" style="margin:4px 4px 0;">
      <button data-status="all" class="on">All</button><button data-status="working">Working</button><button data-status="dormant">Dormant</button><button data-status="offline">Offline</button><button data-status="pinned">Pinned</button>
    </div>
    <ul id="agent-list"></ul>
  </aside>

  <!-- CONTENT: right panel, switches between stream / board / graph -->
  <div class="content-wrap">
    <div class="content-head" id="content-head">
      <span id="stream-title">Select an agent →</span>
      <div class="seg" id="content-view">
        <button data-content="stream" class="on">Stream</button>
        <button data-content="board">Board</button>
        <button data-content="graph">Graph</button>
        <button data-content="editor">Editor</button>
      </div>
      <span id="stream-cost" class="cost"></span>
    </div>

    <!-- STREAM: selected agent's live activity -->
    <section id="stream-view" class="view active">
      <div class="seg detail-view" id="detail-view" style="margin:4px 8px 0;">
        <button data-detail="stream" class="on">Stream</button><button data-detail="decisions">Decisions</button>
      </div>
      <div id="stream" class="stream"><div class="empty">Pick an agent on the left to watch it think, live.</div></div>
      <div id="decisions" style="display:none; flex:1; min-height:0; overflow:auto;"></div>
      <form id="steer-form" class="steer">
        <input id="steer-to" type="text" placeholder="to (role or uuid)" autocomplete="off">
        <input id="steer-body" type="text" placeholder="steer this agent — type a message and hit ↵" autocomplete="off">
        <button type="submit">Steer</button>
      </form>
    </section>

    <!-- BOARD: thread overview -->
    <main id="board-view" class="view"><div id="board-root" style="flex:1;min-height:0;overflow:auto;"></div></main>

    <!-- GRAPH -->
    <main id="graph-view" class="view">
      <div class="graph-controls">
        <!-- ROW 1 — VIEW -->
        <div class="gc-toolbar gc-row1">
          <div class="seg" id="graph-mode">
            <button data-mode="backbone" class="on">Backbone</button><button data-mode="raw">Raw atoms</button>
          </div>
          <div class="seg" id="graph-layout" title="Layout: force-directed · time-hierarchical · dependency DAG · radial">
            <button data-layout="force" class="on">Force</button><button data-layout="time">Time</button><button data-layout="dag">DAG</button><button data-layout="radial">Radial</button>
          </div>
          <div class="seg" id="graph-dim" title="2D canvas ⇄ 3D force layout (same data + filters)">
            <button data-dim="2d" class="on">2D</button><button data-dim="3d">3D</button>
          </div>
          <div class="gc-dd" id="preset-dd">
            <button class="ctl-btn dd-btn" id="preset-dd-btn" aria-expanded="false" title="Views are presets — click to apply a saved view">▦ Views ▾</button>
            <div class="gc-menu" id="preset-bar"></div>
          </div>
          <div class="gc-dd" id="graphs-dd">
            <button class="ctl-btn dd-btn" id="graphs-dd-btn" aria-expanded="false" title="Federated union — toggle which source graphs are visible">⬡ Graphs ▾</button>
            <div class="gc-menu" id="graph-facets"><span class="gc-lbl">source graphs</span></div>
          </div>
          <button id="lightshow-toggle" class="ctl-btn lightshow" title="Dark room — dim everything but the live attention beams">🔦 Dark room</button>
        </div>

        <!-- ROW 2 — TOOLS -->
        <div class="gc-toolbar gc-row2">
          <div class="seg" id="graph-edit" title="Draw a typed edge → assert a claim.">
            <button data-link="assign" title="assign work to an agent (a)">assign</button><button data-link="depends" title="work depends on work (d)">dep</button><button data-link="relates" title="relate two nodes (r)">rel</button><button data-link="watch" title="agent watches a thread (w)">watch</button>
          </div>
          <button id="graph-newwork" class="ctl-btn" title="Create a new work node on the canvas (n)">✛ Work</button>
          <button id="graph-relayout" class="ctl-btn" title="Re-run layout">⟳</button>
          <button id="preset-save" class="ctl-btn" title="Save the current view as a named preset">＋ Save</button>
          <button id="legend-toggle" class="ctl-btn on" title="Show/hide the node-types legend">▤ Legend</button>
          <button id="isolates-toggle" class="ctl-btn" title="Show/hide disconnected (0-degree) nodes">◌ Isolates</button>
          <button id="gc-more" class="ctl-btn" title="Show/hide advanced controls" aria-expanded="false">⚙ More</button>
        </div>

        <div class="gc-drawer collapsed" id="gc-drawer">
          <label class="gc-sel" title="Size nodes by traffic, $ cost, context, or how recently active">size
            <select id="size-by">
              <option value="messages">messages</option>
              <option value="cost">cost</option>
              <option value="context">context</option>
              <option value="recency">recency</option>
            </select>
          </label>
          <div class="gc-row" id="edge-layers" title="Toggle edge layers by kind">
            <span class="gc-lbl">edges</span>
            <label><input type="checkbox" data-layer="struct" checked> struct</label>
            <label><input type="checkbox" data-layer="talk" checked> talk</label>
            <label><input type="checkbox" data-layer="child" checked> child</label>
            <label title="agent → the code it touched"><input type="checkbox" data-layer="working" checked> working</label>
            <label title="live attention beam"><input type="checkbox" data-layer="attending" checked> attending</label>
          </div>
          <div class="gc-row recency" id="graph-recency" title="Hide nodes idle longer than N minutes">
            <span class="gc-lbl">recency</span>
            <input id="recency-slider" type="range" min="5" max="120" step="5" value="45">
            <span id="recency-val" class="gc-val">45m</span>
          </div>
          <div class="depth hidden" id="graph-depth" title="AST collapse depth">
            <span class="depth-lbl">depth</span>
            <input id="depth-slider" type="range" min="0" max="6" step="1" value="1">
            <span id="depth-val" class="depth-val">1</span>
          </div>
        </div>
      </div>

      <div id="canvas-wrap">
        <div id="cy"></div>
        <div id="cy3d"></div>
        <div id="legend" class="legend"></div>
        <div id="graph-toast" class="toast"></div>
        <div id="link-banner" class="link-banner hidden"></div>
      </div>

      <aside id="node-panel" class="node-panel hidden">
        <div class="pane-head"><span id="node-title">node</span><button id="node-close">✕</button></div>
        <div id="node-claims"></div>
      </aside>
    </main>

    <!-- EDITOR: embedded Theia IDE -->
    <main id="editor-view" class="view">
      <iframe id="theia-frame" src="http://localhost:3000" style="width:100%;height:100%;border:none;"></iframe>
    </main>

    <!-- TIME TAPE -->
    <div id="timetape">
      <div class="tt-head">
        <button id="timetape-toggle" class="pane-toggle" title="collapse timetape">▲</button>
        <span class="tt-title">Time Tape</span>
        <div class="tt-range" id="tt-range">
          <button data-mins="15">15m</button><button data-mins="30" class="on">30m</button><button data-mins="60">60m</button>
        </div>
        <span class="tt-readout" id="tt-readout">— hover the ribbon —</span>
        <span class="tt-cost" id="tt-cost"></span>
      </div>
      <div id="tt-track" class="tt-track">
        <svg id="tt-cost-spark" class="tt-spark" preserveAspectRatio="none"></svg>
        <div id="tt-lane-msg" class="tt-lane"></div>
        <div id="tt-lane-session" class="tt-lane"></div>
        <div id="tt-lane-run" class="tt-lane"></div>
        <div id="tt-now" class="tt-now"></div>
        <div id="tt-scrub" class="tt-scrub"></div>
      </div>
    </div>
  </div>
</div>

<script src="vendor/cytoscape.min.js"></script>
<script src="vendor/layout-base.js"></script>
<script src="vendor/cose-base.js"></script>
<script src="vendor/cytoscape-fcose.js"></script>
<script src="vendor/3d-force-graph.min.js"></script>
<script src="graph-domain.js"></script>
<script src="graph3d.js"></script>
<script src="graph.js"></script>
<script src="timetape.js"></script>
<script src="md.js"></script>
<script src="board.js"></script>
<script src="decisions.js"></script>
<script src="app.js"></script>
<script src="command.js"></script>
</body>
</html>
